<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="./main.css"  />
  <title>Tip Calculator</title>
</head>

<body>
  <div class="container">
    
  
  <header>
    <h2>Welcome to tip calculator!👋🏽</h2>
    <p>Ready to solve your complex calculations?</p>
  </header>
  
  <section>
    <form id="form" class="tip-form">
      
      <label for="Amount">Amount:</label>
      <input type="number" name="amount" id="amount" min="0" required />
      
      <div>
        <label for="Tip">Tip:</label>
        
        
        <div>
          <button class="subtract" type="submit">-</button>
        <input type="number" name="tip-amount" id="tip-amount" value="" required />
        <button class="increment" type="submit">+</button>
        </div>
      </div>
      
       <div>
        <label for="People">People:</label>
        
        
        <div>
          <button class="subtract-people" type="button">-</button>
        <input type="number" name="people" id="people" value="" required />
        <button class="increment-people" type="button">+</button>
        </div>
      </div>
      

      
      
      
      <div class="action-btns">
        <button id="calculate-btn" type="submit">Calculate</button>
      <button id="reset-btn" type="button">Reset</button>
      
      </div>
      
      
    </form>
  </section>
  
  <section>
    <div>
      <p>Tip amount is Ksh:<span class="tip-details">0</span></p>
    </div>
    <div>
       <p>Total amount is Ksh:<span class="amount-details">0</span></p>
    </div>
    <div>
       <p>Amount per person is Ksh:<span class="amount-per-person">0</span></p>
    </div>
  </section>
  
  <script src='./js/script.js' type="text/javascript" charset="utf-8">
    
  </script>
  </div>
</body>

</html>
